server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:4000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* ^/(?:[^/]+\.html)$ {
    return 301 /;
  }

  location ~* ^/(?:MwangazaMail|ALKASH-TRANS)/.+\.html$ {
    return 301 /;
  }

  location = /admin {
    return 301 /;
  }

  location ^~ /admin/ {
    return 301 /;
  }

  location = /MwangazaMail/admin {
    return 301 /;
  }

  location ^~ /MwangazaMail/admin/ {
    return 301 /;
  }

  location = /MwangazaMail {
    return 301 /MwangazaMail/;
  }

  location ^~ /MwangazaMail/ {
    alias /usr/share/nginx/html/Mwangaza/;
    try_files $uri $uri/ /MwangazaMail/index.html;
  }

  location = /ALKASH-TRANS {
    return 301 /ALKASH-TRANS/;
  }

  location ^~ /ALKASH-TRANS/ {
    rewrite ^/ALKASH-TRANS/(.*)$ /$1 break;
    root /usr/share/nginx/html/ALKASH/dist;
    try_files $uri $uri/ /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
