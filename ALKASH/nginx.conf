server {
  listen 80;
  listen [::]:80;
  server_name _;

  location = / {
    return 302 /ALKASH-TRANS/;
  }

  location = /ALKASH-TRANS {
    return 301 /ALKASH-TRANS/;
  }

  location ^~ /ALKASH-TRANS/assets/ {
    alias /usr/share/nginx/html/ALKASH-TRANS/assets/;
  }

  location ^~ /ALKASH-TRANS/ {
    alias /usr/share/nginx/html/ALKASH-TRANS/;
    try_files $uri $uri/ /ALKASH-TRANS/index.html;
  }
}
