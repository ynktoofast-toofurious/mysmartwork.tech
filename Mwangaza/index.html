<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MwangazaMail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="dns-prefetch" href="https://esm.sh" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="modulepreload" href="https://esm.sh/react@18.3.1" />
    <link rel="modulepreload" href="https://esm.sh/react-dom@18.3.1/client" />
    <link rel="stylesheet" href="./styles.css?v=20260604-1" />
  </head>
  <body>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #08101f;
      }

      body[data-access-granted="true"] #root {
        display: block;
      }

      #root[hidden] {
        display: none !important;
      }

      .access-backdrop {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(circle at top, rgba(28, 54, 110, 0.78), rgba(2, 7, 20, 0.92));
      }

      .access-backdrop.is-open {
        display: flex;
      }

      .access-card {
        width: min(520px, 100%);
        border-radius: 28px;
        border: 1px solid rgba(186, 204, 255, 0.22);
        background: linear-gradient(180deg, rgba(15, 24, 53, 0.96), rgba(8, 14, 31, 0.98));
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
        padding: 28px;
        color: #eef2ff;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      .access-pill {
        display: inline-flex;
        border-radius: 999px;
        border: 1px solid rgba(175, 197, 255, 0.24);
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #b8cbff;
      }

      .access-card h1 {
        margin: 14px 0 10px;
        font-family: "Outfit", sans-serif;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.08;
      }

      .access-card p {
        margin: 0;
        color: #c8d4fb;
        line-height: 1.6;
      }

      .access-card label {
        display: block;
        margin-top: 18px;
        font-weight: 700;
        font-size: 13px;
        color: #dce7ff;
      }

      .access-card input {
        width: 100%;
        margin-top: 8px;
        border-radius: 14px;
        border: 1px solid rgba(175, 197, 255, 0.28);
        background: #0a1430;
        color: #eef2ff;
        font: inherit;
        padding: 13px 14px;
      }

      .access-error {
        min-height: 20px;
        margin-top: 10px;
        color: #ffb8c2;
        font-size: 13px;
      }

      .access-actions {
        margin-top: 16px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .access-actions button {
        cursor: pointer;
        border: none;
        border-radius: 14px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 700;
      }

      .access-confirm {
        background: linear-gradient(135deg, #6e9bff, #8ce0ff);
        color: #051129;
      }

      .access-back {
        background: transparent;
        border: 1px solid rgba(175, 197, 255, 0.28) !important;
        color: #dce7ff;
      }
    </style>
    <div class="access-backdrop" id="accessBackdrop" aria-hidden="true">
      <section class="access-card" role="dialog" aria-modal="true" aria-labelledby="accessTitle">
        <span class="access-pill">Local access gate</span>
        <h1 id="accessTitle">Enter the project access code</h1>
        <p>This sandbox stays locked until the approved local access code is entered.</p>
        <label for="accessCodeInput">Access code</label>
        <input id="accessCodeInput" type="password" autocomplete="off" />
        <div class="access-error" id="accessError"></div>
        <div class="access-actions">
          <button class="access-confirm" id="accessConfirmBtn" type="button">Unlock project</button>
          <button class="access-back" id="accessBackBtn" type="button">Back to portal</button>
        </div>
      </section>
    </div>
    <div id="root" hidden></div>
    <footer class="site-powered-by">
      <a href="https://ynk-techusa.com/" target="_blank" rel="noreferrer">Powered by YNK-Tech USA</a>
      <a href="/privacy-policy.html" rel="noreferrer">Privacy Policy</a>
    </footer>
    <script>
      const ACCESS_KEY = "mwangaza_access_code_unlocked";
      const ACCESS_CODE_KEY = "mwangaza_access_code_value";
      const SEO_ACCESS_CODE = "YNK19912026";
      const SEO_PATH = "/admin/#seo";
      const PROJECT_ACCESS_CODES = ["YNKMW2026", "YNKACCESS2026", "YNK19912026"];
      const ROOT_URL = "https://www.mysmartwork.tech/";
      const accessBackdrop = document.getElementById("accessBackdrop");
      const accessCodeInput = document.getElementById("accessCodeInput");
      const accessError = document.getElementById("accessError");
      const accessConfirmBtn = document.getElementById("accessConfirmBtn");
      const accessBackBtn = document.getElementById("accessBackBtn");
      const root = document.getElementById("root");

      const normalizeCode = (code) => (code || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
      const accessCodeFromQuery = normalizeCode(new URLSearchParams(window.location.search).get("ac"));
      if (PROJECT_ACCESS_CODES.includes(accessCodeFromQuery)) {
        localStorage.setItem(ACCESS_KEY, "true");
        localStorage.setItem(ACCESS_CODE_KEY, accessCodeFromQuery);
        if (window.location.search.includes("ac=")) {
          window.history.replaceState({}, "", `${window.location.pathname}${window.location.hash}`);
        }
      }
      const savedAccessCode = normalizeCode(localStorage.getItem(ACCESS_CODE_KEY));
      const hasValidAccess = localStorage.getItem(ACCESS_KEY) === "true" && PROJECT_ACCESS_CODES.includes(savedAccessCode || "");

      if (!hasValidAccess) {
        localStorage.removeItem(ACCESS_KEY);
        localStorage.removeItem(ACCESS_CODE_KEY);
        localStorage.removeItem("mwangaza_auth");
        window.location.replace(ROOT_URL);
      }

      const unlockPage = () => {
        localStorage.setItem(ACCESS_KEY, "true");
        document.body.dataset.accessGranted = "true";
        root.hidden = false;
        if (document.activeElement instanceof HTMLElement) {
          document.activeElement.blur();
        }
        accessBackdrop.classList.remove("is-open");
        accessBackdrop.setAttribute("aria-hidden", "true");
        root.setAttribute("tabindex", "-1");
        root.focus();
      };

      const showGate = () => {
        accessBackdrop.classList.add("is-open");
        accessBackdrop.setAttribute("aria-hidden", "false");
        accessError.textContent = "";
        accessCodeInput.value = "";
        accessCodeInput.focus();
      };

      if (localStorage.getItem(ACCESS_KEY) === "true") {
        const savedCode = normalizeCode(localStorage.getItem(ACCESS_CODE_KEY));
        if (!PROJECT_ACCESS_CODES.includes(savedCode || "")) {
          localStorage.removeItem(ACCESS_KEY);
          localStorage.removeItem(ACCESS_CODE_KEY);
          localStorage.removeItem("mwangaza_auth");
          showGate();
        } else if (savedCode === normalizeCode(SEO_ACCESS_CODE)) {
          localStorage.setItem("mwangaza_auth", "true");
          window.location.replace(SEO_PATH);
        } else {
          unlockPage();
        }
      } else {
        showGate();
      }

      accessConfirmBtn.addEventListener("click", () => {
        const enteredCode = normalizeCode(accessCodeInput.value);
        if (!PROJECT_ACCESS_CODES.includes(enteredCode)) {
          accessError.textContent = "Invalid access code. Please try again.";
          return;
        }

        localStorage.setItem(ACCESS_KEY, "true");
        localStorage.setItem(ACCESS_CODE_KEY, enteredCode);

        if (enteredCode === normalizeCode(SEO_ACCESS_CODE)) {
          localStorage.setItem("mwangaza_auth", "true");
          window.location.replace(SEO_PATH);
          return;
        }

        unlockPage();
      });

      accessBackBtn.addEventListener("click", () => {
        localStorage.removeItem(ACCESS_KEY);
        localStorage.removeItem(ACCESS_CODE_KEY);
        localStorage.removeItem("mwangaza_auth");
        window.location.assign(ROOT_URL);
      });

      accessCodeInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          accessConfirmBtn.click();
        }
      });
    </script>
    <script type="module" src="./script.js?v=20260604-1"></script>
  </body>
</html>
