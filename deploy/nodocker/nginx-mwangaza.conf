server {
  listen 80;
  listen [::]:80;
  server_name __SITE_DOMAIN__ __SITE_DOMAIN_WWW__;

  root /var/www/mwangaza-site;
  index index.html;

  location /api/ {
    proxy_pass http://127.0.0.1:4000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* ^/(?:[^/]+\.html)$ {
    return 301 https://__SITE_DOMAIN_WWW__/;
  }

  location ~* ^/(?:MwangazaMail|ALKASH-TRANS)/.+\.html$ {
    return 301 https://__SITE_DOMAIN_WWW__/;
  }

  location = /admin {
    return 301 https://__SITE_DOMAIN_WWW__/;
  }

  location ^~ /admin/ {
    return 301 https://__SITE_DOMAIN_WWW__/;
  }

  location = /MwangazaMail/admin {
    return 301 https://__SITE_DOMAIN_WWW__/;
  }

  location ^~ /MwangazaMail/admin/ {
    return 301 https://__SITE_DOMAIN_WWW__/;
  }

  location = /MwangazaMail {
    return 301 /MwangazaMail/;
  }

  location ^~ /MwangazaMail/ {
    alias /var/www/mwangaza-site/Mwangaza/;
    try_files $uri $uri/ /MwangazaMail/index.html;
  }

  location = /ALKASH-TRANS {
    return 301 /ALKASH-TRANS/;
  }

  location ^~ /ALKASH-TRANS/ {
    rewrite ^/ALKASH-TRANS/(.*)$ /$1 break;
    root /var/www/alkash-trans-site;
    try_files $uri $uri/ /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name __API_DOMAIN__;

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
